<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>筆談ボード</title>
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="文字と音声入力で会話するシンプルな筆談ボード">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="display" aria-live="polite" aria-label="文字画面">
        <textarea id="messageInput" autocomplete="off" spellcheck="false" placeholder="ここに表示"></textarea>
      </section>

      <section class="controls" aria-label="操作">
        <button id="micButton" type="button">マイク</button>
        <button id="clearButton" type="button">リセット</button>
        <label>
          文字サイズ
          <input id="fontRange" type="range" min="36" max="120" value="72">
        </label>
      </section>

      <p id="speechStatus" class="status">音声入力は停止中</p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
