<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>筆談ボード</title>
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="スマホChrome向けの筆談ボード">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app flipped">
      <section class="display" aria-live="polite" aria-label="相手に見せる文字">
        <textarea id="messageInput" autocomplete="off" spellcheck="false" inputmode="text" placeholder="ここに表示"></textarea>
        <div id="mirrorText" class="mirror-text">ここに表示</div>
      </section>

      <section class="controls" aria-label="操作">
        <button id="flipButton" class="icon-button active" type="button" aria-label="上下反転">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M7 7h10"/>
            <path d="M12 3v8"/>
            <path d="M8 7l4 4 4-4"/>
            <path d="M17 17H7"/>
            <path d="M12 21v-8"/>
            <path d="M16 17l-4-4-4 4"/>
          </svg>
        </button>
        <button id="clearButton" class="icon-button" type="button" aria-label="リセット">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 6h18"/>
            <path d="M8 6V4h8v2"/>
            <path d="M19 6l-1 15H6L5 6"/>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
          </svg>
        </button>
        <label>
          文字サイズ
          <input id="fontRange" type="range" min="24" max="180" value="72">
        </label>
      </section>

      <p id="speechStatus" class="status">上下反転中</p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
