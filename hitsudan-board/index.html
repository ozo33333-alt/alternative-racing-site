<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <title>筆談ボード</title>
    <meta name="theme-color" content="#0f766e">
    <meta name="description" content="スマホChrome向けの音声入力筆談ボード">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="display" aria-live="polite" aria-label="相手に見せる文字">
        <div id="displayText">ここに表示</div>
      </section>

      <section class="controls" aria-label="操作">
        <button id="micButton" class="icon-button" type="button" aria-label="マイク">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z"/>
            <path d="M19 11a7 7 0 0 1-14 0"/>
            <path d="M12 18v4"/>
            <path d="M8 22h8"/>
          </svg>
        </button>
        <button id="clearButton" class="icon-button" type="button" aria-label="リセット">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M3 12a9 9 0 1 0 3-6.7"/>
            <path d="M3 4v6h6"/>
          </svg>
        </button>
        <label>
          文字サイズ
          <input id="fontRange" type="range" min="36" max="120" value="76">
        </label>
      </section>

      <p id="speechStatus" class="status">音声入力は停止中</p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
