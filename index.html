<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ALTERNATIVE RACING - Race Your Own Path. A refined performance cycling label."
    />
    <title>ALTERNATIVE RACING</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #030303;
        --fg: #f4f1ed;
        --muted: #a8a29b;
        --line: rgba(244, 241, 237, 0.16);
        --accent: #c80021;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 78% 18%, rgba(200, 0, 33, 0.16), transparent 28rem),
          linear-gradient(130deg, rgba(255, 255, 255, 0.055), transparent 32%),
          var(--bg);
        color: var(--fg);
        font-family: Inter, "Helvetica Neue", Arial, sans-serif;
        letter-spacing: -0.02em;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        pointer-events: none;
        content: "";
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        background-size: 76px 76px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.8), transparent 80%);
      }

      .page {
        display: flex;
        min-height: 100vh;
        padding: clamp(24px, 4vw, 56px);
      }

      .cover {
        position: relative;
        display: grid;
        width: 100%;
        min-height: calc(100vh - clamp(48px, 8vw, 112px));
        padding: clamp(26px, 5vw, 72px);
        border: 1px solid var(--line);
        background: rgba(3, 3, 3, 0.56);
        isolation: isolate;
      }

      .cover::after {
        position: absolute;
        top: clamp(26px, 5vw, 72px);
        right: clamp(26px, 5vw, 72px);
        width: clamp(74px, 13vw, 168px);
        height: 2px;
        content: "";
        background: var(--accent);
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        align-self: start;
        gap: 24px;
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      .mark {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--fg);
      }

      .mark::before {
        display: inline-block;
        width: 8px;
        height: 8px;
        content: "";
        background: var(--accent);
      }

      .season {
        text-align: right;
      }

      .hero {
        display: grid;
        align-self: center;
        max-width: 1180px;
        margin-block: clamp(72px, 13vh, 148px);
      }

      h1 {
        max-width: 11ch;
        margin: 0;
        font-size: clamp(4.5rem, 16vw, 14rem);
        font-weight: 800;
        line-height: 0.78;
        letter-spacing: -0.105em;
        text-transform: uppercase;
      }

      .subcopy {
        position: relative;
        max-width: 680px;
        margin: clamp(32px, 5vw, 56px) 0 0;
        padding-left: clamp(18px, 3vw, 34px);
        color: var(--fg);
        font-size: clamp(1.15rem, 2.5vw, 2rem);
        font-weight: 500;
        letter-spacing: -0.04em;
      }

      .subcopy::before {
        position: absolute;
        top: 0.18em;
        bottom: 0.1em;
        left: 0;
        width: 3px;
        content: "";
        background: var(--accent);
      }

      .categories {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        align-self: end;
        gap: 0;
        border-top: 1px solid var(--line);
      }

      .category {
        display: flex;
        min-height: 140px;
        padding: clamp(22px, 3vw, 34px) clamp(18px, 3vw, 32px);
        border-right: 1px solid var(--line);
        color: var(--fg);
        text-decoration: none;
        transition: background 180ms ease, color 180ms ease, transform 180ms ease;
      }

      .category:last-child {
        border-right: 0;
      }

      .category span {
        align-self: end;
        font-size: clamp(1.05rem, 2vw, 1.55rem);
        font-weight: 700;
        letter-spacing: -0.05em;
      }

      .category:hover,
      .category:focus-visible {
        background: rgba(200, 0, 33, 0.92);
        color: #fff;
        outline: none;
        transform: translateY(-3px);
      }

      @media (max-width: 760px) {
        .page {
          padding: 16px;
        }

        .cover {
          min-height: calc(100vh - 32px);
          padding: 24px;
        }

        .cover::after {
          top: 24px;
          right: 24px;
          width: 72px;
        }

        .nav {
          align-items: flex-start;
          font-size: 0.66rem;
        }

        .season {
          max-width: 11ch;
        }

        .hero {
          margin-block: 68px 56px;
        }

        h1 {
          font-size: clamp(4.1rem, 22vw, 7.2rem);
          line-height: 0.82;
        }

        .subcopy {
          max-width: 15rem;
        }

        .categories {
          grid-template-columns: 1fr;
          border-bottom: 1px solid var(--line);
        }

        .category {
          min-height: 82px;
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }

        .category:last-child {
          border-bottom: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page" aria-label="ALTERNATIVE RACING cover page">
      <section class="cover">
        <header class="nav" aria-label="Brand header">
          <div class="mark">Alternative Racing</div>
          <div class="season">Performance Line</div>
        </header>

        <div class="hero">
          <h1>ALTERNATIVE RACING</h1>
          <p class="subcopy">Race Your Own Path.</p>
        </div>

        <nav class="categories" aria-label="Product categories">
          <a class="category" href="#jerseys"><span>Jerseys</span></a>
          <a class="category" href="#base-layers"><span>Base Layers</span></a>
          <a class="category" href="#street-line"><span>Street Line</span></a>
        </nav>
      </section>
    </main>
  </body>
</html>
